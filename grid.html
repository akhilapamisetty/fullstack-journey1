<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css grid</title>
    <style>
        .container{
            background-color: rgb(43, 226, 58);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .box{
            background-color: rgb(214, 210, 204);
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>css grid example</h1>
    <div class="container">
        <div class="box">html</div>
        <div class="box">css</div>
        <div class="box">javascript</div>
        <div class="box">python</div>
        <div class="box">git hub</div>
        <div class="box">React</div>
    </div>
</body>
</html>
